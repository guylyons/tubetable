    <text x="282" y="154" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="650" letter-spacing=".5" opacity=".68">mix YouTube like a tiny soundboard</text>
