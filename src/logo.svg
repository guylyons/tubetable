<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Tubetable logo</title>
  <desc id="desc">A clean Tubetable wordmark with a playful mixer table icon.</desc>
  <defs>
